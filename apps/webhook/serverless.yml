service: feed-digest

provider:
  name: aws
  runtime: nodejs22.x
  region: eu-west-1
  stage: ${opt:stage, 'prod'}
  environment:
    TELEGRAM_BOT_TOKEN: ${ssm:/feed-digest/${self:provider.stage}/TELEGRAM_BOT_TOKEN}
    TELEGRAM_SECRET_TOKEN: ${ssm:/feed-digest/${self:provider.stage}/TELEGRAM_SECRET_TOKEN}
    TELEGRAM_CHAT_ID: ${ssm:/feed-digest/${self:provider.stage}/TELEGRAM_CHAT_ID}
    GOOGLE_SHEET_ID: ${ssm:/feed-digest/${self:provider.stage}/GOOGLE_SHEET_ID, ""}
    GOOGLE_SERVICE_ACCOUNT_JSON: ${ssm:/feed-digest/${self:provider.stage}/GOOGLE_SERVICE_ACCOUNT_JSON, ""}
    STORAGE_BACKEND: ${ssm:/feed-digest/${self:provider.stage}/STORAGE_BACKEND, "google-sheets"}
    NOTION_API_KEY: ${ssm:/feed-digest/${self:provider.stage}/NOTION_API_KEY, ""}
    NOTION_INBOX_DB_ID: ${ssm:/feed-digest/${self:provider.stage}/NOTION_INBOX_DB_ID, ""}
    NOTION_ALL_DB_ID: ${ssm:/feed-digest/${self:provider.stage}/NOTION_ALL_DB_ID, ""}
    NOTION_SAVED_DB_ID: ${ssm:/feed-digest/${self:provider.stage}/NOTION_SAVED_DB_ID, ""}
    DYNAMODB_TABLE_NAME: !Ref SessionsTable
    DYNAMODB_ARTICLES_TABLE_NAME: !Ref ArticlesTable
    DYNAMODB_TAG_PREF_TABLE_NAME: !Ref TagPrefsTable
    USER_INTERESTS: ${ssm:/feed-digest/${self:provider.stage}/USER_INTERESTS, ""}
    SUMMARY_LANG: ${ssm:/feed-digest/${self:provider.stage}/SUMMARY_LANG}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:DeleteItem
          Resource: !GetAtt SessionsTable.Arn
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:BatchWriteItem
            - dynamodb:Query
          Resource:
            - !GetAtt ArticlesTable.Arn
            - !Sub "${ArticlesTable.Arn}/index/GSI1"
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
          Resource: !GetAtt TagPrefsTable.Arn

functions:
  webhook:
    handler: main.handler
    timeout: 29
    events:
      - httpApi:
          path: /webhook
          method: POST

resources:
  Resources:
    SessionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: feed-digest-sessions-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: chatId
            AttributeType: S
        KeySchema:
          - AttributeName: chatId
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    ArticlesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: feed-digest-articles-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    TagPrefsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: feed-digest-tag-prefs-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: chatId
            AttributeType: S
        KeySchema:
          - AttributeName: chatId
            KeyType: HASH
