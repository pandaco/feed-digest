<div class="toast-stack" aria-live="polite">
  @for (t of toast.toasts(); track t.id) {
    <div
      class="toast"
      role="status"
      [class.toast-success]="t.kind === 'success'"
      [class.toast-error]="t.kind === 'error'"
    >
      <div class="toast-row">
        @if (t.kind === 'progress') {
          <span class="toast-spinner" aria-hidden="true"></span>
        }
        <span class="toast-message">{{ t.message }}</span>
        @if (t.kind === 'progress' && t.total) {
          <span class="toast-count">{{ t.current ?? 0 }} / {{ t.total }}</span>
        }
        @if (t.kind === 'error') {
          <button class="toast-dismiss" (click)="toast.dismiss(t.id)" aria-label="Dismiss">&#10005;</button>
        }
      </div>
      @if (t.kind === 'progress' && t.total) {
        <div class="toast-bar">
          <div class="toast-bar-fill" [style.width.%]="((t.current ?? 0) / t.total) * 100"></div>
        </div>
      }
    </div>
  }
</div>
