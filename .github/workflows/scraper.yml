name: InoReader Scraper


on:
  schedule:
    - cron: '0 6 * * *'    # 07:00 Paris winter (UTC+1)
    - cron: '0 5 * * *'    # 07:00 Paris summer (UTC+2)
    - cron: '0 9 * * *'    # 10:00 Paris winter
    - cron: '0 8 * * *'    # 10:00 Paris summer
    - cron: '0 12 * * *'   # 13:00 Paris winter
    - cron: '0 11 * * *'   # 13:00 Paris summer
    - cron: '0 15 * * *'   # 16:00 Paris winter
    - cron: '0 14 * * *'   # 16:00 Paris summer
    - cron: '0 18 * * *'   # 19:00 Paris winter
    - cron: '0 17 * * *'   # 19:00 Paris summer
  workflow_dispatch:
    inputs:
      run_now:
        description: 'Bypass timezone guard and run now'
        required: false
        default: 'false'
        type: boolean

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Restore local data (session + tag preferences)
        uses: actions/cache@v5
        with:
          path: |
            session.json
            tag-preferences.json
          key: scraper-data-${{ github.run_id }}
          restore-keys: |
            scraper-data-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright-core install chromium --with-deps

      - name: Build scraper
        run: npx nx build scraper

      - name: Run scraper
        run: node dist/apps/scraper/main.js
        env:
          # --- Secrets ---
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          INOREADER_EMAIL: ${{ secrets.INOREADER_EMAIL }}
          INOREADER_PASSWORD: ${{ secrets.INOREADER_PASSWORD }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_INBOX_DB_ID: ${{ secrets.NOTION_INBOX_DB_ID }}
          NOTION_ALL_DB_ID: ${{ secrets.NOTION_ALL_DB_ID }}
          NOTION_SAVED_DB_ID: ${{ secrets.NOTION_SAVED_DB_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SECRET_TOKEN: ${{ secrets.TELEGRAM_SECRET_TOKEN }}
          # --- Variables ---
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          SUMMARY_LANG: ${{ vars.SUMMARY_LANG }}
          ARTICLES_LIMIT: ${{ vars.ARTICLES_LIMIT }}
          MAX_TAGS: ${{ vars.MAX_TAGS }}
          PIPELINE_CONCURRENCY: ${{ vars.PIPELINE_CONCURRENCY }}
          PIPELINE_MIN_DELAY_MS: ${{ vars.PIPELINE_MIN_DELAY_MS }}
          PIPELINE_MAX_DELAY_MS: ${{ vars.PIPELINE_MAX_DELAY_MS }}
          SCRAPER_SOURCE: ${{ vars.SCRAPER_SOURCE }}
          SHOW_BROWSER: ${{ vars.SHOW_BROWSER }}
          STORAGE_BACKEND: ${{ vars.STORAGE_BACKEND }}
          TAG_PREFERENCE_THRESHOLD: ${{ vars.TAG_PREFERENCE_THRESHOLD }}
          TAG_PREFERENCE_MIN_RUNS: ${{ vars.TAG_PREFERENCE_MIN_RUNS }}
          USER_INTERESTS: ${{ vars.USER_INTERESTS }}
          # --- Static ---
          NODE_ENV: development
          RUN_NOW: ${{ inputs.run_now || 'false' }}

      - name: Save local data (session + tag preferences)
        if: always()
        uses: actions/cache@v5
        with:
          path: |
            session.json
            tag-preferences.json
          key: scraper-data-${{ github.run_id }}
